
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>High-Fidelity Homepage Design</title>
      <meta name="description" content="Showcasing premium cricket products and services, this app encourages visits to MR.WILLOW Cricket Store in Johor Bahru while highlighting training and community engagement." />
      <meta name="robots" content="noindex, nofollow" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      
    </head>

    <body>
      
      <div id="root">
        <style>
          .static-loader {
            position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #1c2117; color: #f5f3ec; font-family: ui-sans-serif, system-ui, sans-serif;
          }
          .static-ball {
            width: 5rem; height: 5rem; border-radius: 9999px; background-color: #8c1c1c;
            box-shadow: inset -6px -6px 12px rgba(0,0,0,0.6); border: 2px solid #5a0f0f;
            position: relative; overflow: hidden; margin-bottom: 2rem; display: flex; align-items: center; justify-content: center;
            animation: spin 1.5s linear infinite;
          }
          .static-seam-container {
            position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transform: rotate(45deg);
          }
          .static-seam {
            width: 100%; height: 0.75rem; border-top: 2px dashed rgba(255,255,255,0.6); border-bottom: 2px dashed rgba(255,255,255,0.6); border-radius: 50%;
          }
          .static-thread {
            position: absolute; width: 100%; height: 2px; background-color: rgba(255,255,255,0.2); transform: rotate(45deg);
          }
          .static-title {
            font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; font-family: 'Outfit', sans-serif; margin-bottom: 1rem;
          }
          .static-subtitle {
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; color: rgba(245, 243, 236, 0.5); font-family: ui-sans-serif, system-ui, sans-serif;
          }
          @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        </style>
        <div class="static-loader">
          <div class="static-ball">
            <div class="static-seam-container"><div class="static-seam"></div></div>
            <div class="static-thread"></div>
          </div>
          <h2 class="static-title">Mr. Willow</h2>
          <div class="static-subtitle">Preparing the pitch...</div>
        </div>
      </div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
